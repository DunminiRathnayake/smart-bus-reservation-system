<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartGo – My Bookings</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Dynamic Header injected by main.js -->
  <header id="app-header" class="app-header"></header>

  <!-- Bookings Roster -->
  <main class="container" style="padding-top: 40px; padding-bottom: 40px;">
    <div class="bookings-header">
      <h1 class="bookings-title">Booking History</h1>
      <span class="text-muted">Manage your reservation passes</span>
    </div>

    <div class="bookings-container">
      <!-- Confirmed Ticket Mockcard -->
      <div class="booking-ticket">
        <div class="ticket-header">
          <div>
            <span style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Reference</span>
            <div style="font-weight: 700; font-family: monospace;">SG-49204-NYC</div>
          </div>
          <span class="status-badge status-confirmed">Confirmed</span>
        </div>
        
        <div class="ticket-body">
          <div class="ticket-details">
            <div class="ticket-route">
              <span>New York</span>
              <span class="route-arrow">→</span>
              <span>Washington</span>
            </div>
            
            <div class="ticket-meta">
              <div class="meta-item">
                <span class="text-muted">Departure:</span><br>
                <strong>01 Jul 2026, 08:30 AM</strong>
              </div>
              <div class="meta-item">
                <span class="text-muted">Bus Model:</span><br>
                <strong>Volvo 9700 (AC Seater)</strong>
              </div>
              <div class="meta-item">
                <span class="text-muted">Passenger:</span><br>
                <strong>Jane Doe</strong>
              </div>
              <div class="meta-item">
                <span class="text-muted">Seat(s):</span><br>
                <strong>A2</strong>
              </div>
            </div>
          </div>
          
          <div class="ticket-qr-section">
            <div class="qr-box">
              <div class="qr-placeholder"></div>
            </div>
            <span style="font-size: 11px; color: var(--text-muted); text-align: center; display: block;">Scan Boarding Pass</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Dynamic Footer injected by main.js -->
  <footer id="app-footer" class="app-footer"></footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
