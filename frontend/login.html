<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartGo – Access Account</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">SmartGo</a>
        <h3 class="auth-title">Log In</h3>
        <p class="auth-subtitle">Access your bookings and travel preference tools.</p>
      </div>

      <form class="auth-form" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="name@example.com" 
            class="form-input"
            required
          >
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            placeholder="••••••••" 
            class="form-input"
            required
          >
        </div>

        <button 
          type="button" 
          onclick="alert('Authentication is ready for implementation.')" 
          class="btn btn-search"
          style="margin-top: 8px;"
        >
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/api.js"></script>
</body>
</html>
